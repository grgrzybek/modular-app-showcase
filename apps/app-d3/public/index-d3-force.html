<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Non-React Application with D3 + Cola layout</title>
  <link rel="icon" type="image/png" href="images/icon.png">
</head>
<body>
  <!-- From ChatGPT - to change to ts file -->
  <svg width="400" height="200" style="border:1px solid #ccc;"></svg>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const svg = d3.select("svg");

    const nodes = [
      { id: "A" },
      { id: "B" }
    ];

    const links = [
      { source: "A", target: "B" }
    ];

    const simulation = d3.forceSimulation(nodes)
        // .force("link", d3.forceLink(links).id(d => d.id).distance(100))
        // .force("charge", d3.forceManyBody().strength(-200)) // repel nodes
        .force("center", d3.forceCenter(200, 100)); // center of the svg

    const link = svg.append("g")
        .attr("stroke", "#999")
        .attr("stroke-width", 2)
        .selectAll("line")
        .data(links)
        .join("line");

    const node = svg.append("g")
        .attr("fill", "steelblue")
        .selectAll("circle")
        .data(nodes)
        .join("circle")
        .attr("r", 10)
        .call(drag(simulation));

    function drag(simulation) {
      return d3.drag()
          .on("start", (event, d) => {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
          })
          .on("drag", (event, d) => {
            d.fx = event.x;
            d.fy = event.y;
          })
          .on("end", (event, d) => {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
          });
    }

    simulation.on("tick", () => {
      link
          .attr("x1", d => d.source.x)
          .attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x)
          .attr("y2", d => d.target.y);

      node
          .attr("cx", d => d.x)
          .attr("cy", d => d.y);
    });
  </script>
</body>
</html>
